name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

      # The site is served under https://chrisnorthfield.com/rules, so the built
      # files must physically live under /rules/. The custom-domain apex (root)
      # redirects to /rules/.
      - name: Assemble Pages artifact
        run: |
          mkdir -p _site/rules
          cp -r dist/. _site/rules/
          touch _site/.nojekyll
          echo 'chrisnorthfield.com' > _site/CNAME
          cat > _site/index.html <<'EOF'
          <!doctype html>
          <meta charset="utf-8" />
          <title>Redirecting…</title>
          <meta http-equiv="refresh" content="0; url=/rules/" />
          <link rel="canonical" href="/rules/" />
          <p>Redirecting to <a href="/rules/">/rules/</a>…</p>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
